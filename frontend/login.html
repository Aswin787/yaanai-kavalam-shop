<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — யாளை கவளம்</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#1B4332;--gold:#C9A84C;--cream:#FFF8F0;--brown:#3D1C02;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a2416,#1B4332,#2D5016);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

.login-card{background:white;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.login-logo{text-align:center;margin-bottom:30px;}
.login-logo .brand{font-family:'Playfair Display',serif;font-size:28px;color:var(--green);}
.login-logo .brand-tamil{font-family:'Noto Sans Tamil',sans-serif;color:var(--gold);font-size:16px;margin-top:4px;}
.login-logo .elephant{font-size:48px;margin-bottom:8px;display:block;}

.tabs{display:flex;background:#f5f5f5;border-radius:12px;padding:4px;margin-bottom:25px;}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-weight:600;font-size:14px;transition:all 0.3s;color:#888;}
.tab.active{background:white;color:var(--green);box-shadow:0 2px 8px rgba(0,0,0,0.1);}

.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--green);margin-bottom:6px;}
.form-group input{width:100%;padding:13px 16px;border:2px solid #e8e8e8;border-radius:12px;font-size:14px;outline:none;transition:border 0.3s;}
.form-group input:focus{border-color:var(--green);}

.btn-submit{background:linear-gradient(135deg,var(--green),#2D6A4F);color:white;border:none;width:100%;padding:15px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:5px;}
.btn-submit:hover{transform:scale(1.02);box-shadow:0 5px 20px rgba(27,67,50,0.4);}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#aaa;font-size:13px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e8e8e8;}

.btn-google{background:white;color:#333;border:2px solid #e8e8e8;width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-google:hover{border-color:var(--green);background:#f8fff8;}
.google-icon{font-size:20px;}

.forgot-link{text-align:right;margin-top:6px;}
.forgot-link a{color:var(--gold);font-size:12px;text-decoration:none;font-weight:600;}
.forgot-link a:hover{text-decoration:underline;}

.error-msg{background:#fce4ec;border:1px solid #e91e63;color:#c62828;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:15px;display:none;}
.error-msg.show{display:block;}
.success-msg{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:15px;display:none;}
.success-msg.show{display:block;}

.admin-link{text-align:center;margin-top:20px;}
.admin-link a{color:#888;font-size:12px;text-decoration:none;}
.admin-link a:hover{color:var(--green);}

footer-text{display:block;text-align:center;margin-top:20px;color:rgba(255,255,255,0.5);font-size:12px;}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <span class="elephant">🐘</span>
    <div class="brand">Yaanai Kavalam</div>
    <div class="brand-tamil">யாளை கவளம்</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login',this)">Login</div>
    <div class="tab" onclick="switchTab('signup',this)">Sign Up</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password">
    </div>
    <div class="forgot-link"><a href="#" onclick="forgotPassword()">Forgot password?</a></div>
    <button class="btn-submit" onclick="login()">Login →</button>

    <div class="divider">or continue with</div>
    <button class="btn-google" onclick="googleLogin()">
      <span class="google-icon">🅶</span> Continue with Google
    </button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none;">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="signupPhone" placeholder="+91 98765 43210">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Create a strong password">
    </div>
    <button class="btn-submit" onclick="signup()">Create Account →</button>

    <div class="divider">or sign up with</div>
    <button class="btn-google" onclick="googleLogin()">
      <span class="google-icon">🅶</span> Continue with Google
    </button>
  </div>

  <div class="admin-link">
    <a href="#" onclick="showAdminLogin()">🔐 Admin Login</a>
  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div id="adminModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:20px;padding:35px;max-width:380px;width:90%;">
    <h3 style="color:var(--green);font-family:'Playfair Display',serif;margin-bottom:20px;font-size:22px;">🔐 Admin Access</h3>
    <div class="form-group">
      <label>Admin Secret Key</label>
      <input type="password" id="adminSecret" placeholder="Enter admin secret key">
    </div>
    <div style="display:flex;gap:12px;margin-top:5px;">
      <button class="btn-submit" style="flex:1;" onclick="adminLogin()">Enter Admin</button>
      <button onclick="document.getElementById('adminModal').style.display='none'" style="flex:1;background:#f5f5f5;color:#333;border:none;padding:15px;border-radius:12px;font-weight:600;cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<span footer-text>© 2024 Yuazhini Foods — Rajabaron Signature Health Food</span>

<script>
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  clearMsgs();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}
function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
}
function clearMsgs() {
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('successMsg').classList.remove('show');
}

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('Please fill in all fields'); return; }
  try {
    const res = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showSuccess('✅ Logged in! Redirecting...');
      setTimeout(() => window.location.href = '/', 1200);
    } else { showError(data.message || 'Login failed'); }
  } catch(err) { showError('Server error. Please try again.'); }
}

async function signup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const phone = document.getElementById('signupPhone').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (!name || !email || !password) { showError('Please fill in all required fields'); return; }
  try {
    const res = await fetch('/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, phone, password })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showSuccess('✅ Account created! Redirecting...');
      setTimeout(() => window.location.href = '/', 1200);
    } else { showError(data.message || 'Signup failed'); }
  } catch(err) { showError('Server error. Please try again.'); }
}

function googleLogin() {
  window.location.href = '/api/auth/google';
}

function showAdminLogin() {
  document.getElementById('adminModal').style.display = 'flex';
}

async function adminLogin() {
  const secret = document.getElementById('adminSecret').value;
  if (!secret) { alert('Enter admin secret key'); return; }
  try {
    const res = await fetch('/api/auth/admin-login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ secret })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'admin.html';
    } else { alert('Invalid admin key'); }
  } catch(err) { alert('Server error'); }
}

async function forgotPassword() {
  const email = prompt('Enter your email address:');
  if (!email) return;
  alert('Password reset link sent to ' + email + '\n(Feature coming soon — contact aswinjk787@gmail.com for now)');
}
</script>
</body>
</html>
