<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order — யாளை கவளம்</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#1B4332;--gold:#C9A84C;--cream:#FFF8F0;--brown:#3D1C02;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--brown);}
nav{background:rgba(27,67,50,0.97);padding:15px 40px;display:flex;align-items:center;justify-content:space-between;}
.logo{color:var(--gold);font-family:'Playfair Display',serif;font-size:22px;font-weight:700;text-decoration:none;}
.logo span{color:white;font-size:13px;display:block;font-family:'Inter',sans-serif;}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:14px;}
.page-header{background:linear-gradient(135deg,var(--green),#2D6A4F);padding:60px;text-align:center;color:white;}
.page-header h1{font-family:'Playfair Display',serif;font-size:42px;color:var(--gold);margin-bottom:10px;}
.page-header p{color:rgba(255,255,255,0.7);font-size:16px;}

/* SEARCH */
.search-section{max-width:600px;margin:-30px auto 40px;padding:0 20px;position:relative;z-index:10;}
.search-card{background:white;border-radius:20px;padding:30px;box-shadow:0 10px 40px rgba(0,0,0,0.15);}
.search-card h3{color:var(--green);font-size:18px;margin-bottom:15px;font-weight:700;}
.search-row{display:flex;gap:12px;}
.search-input{flex:1;padding:14px 18px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;outline:none;transition:border 0.3s;}
.search-input:focus{border-color:var(--green);}
.search-btn{background:linear-gradient(135deg,var(--green),#2D6A4F);color:white;border:none;padding:14px 25px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;white-space:nowrap;}
.search-btn:hover{transform:scale(1.03);}

/* RESULT */
.result-section{max-width:700px;margin:0 auto 60px;padding:0 20px;display:none;}
.result-section.show{display:block;}

.order-info-card{background:white;border-radius:16px;padding:25px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,0.07);}
.order-info-title{font-weight:700;color:var(--green);font-size:16px;margin-bottom:15px;}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f5f5f5;font-size:14px;}
.info-row:last-child{border-bottom:none;}
.info-label{color:#888;}
.info-value{font-weight:600;color:var(--green);}
.status-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.status-placed{background:#e3f2fd;color:#1565c0;}
.status-confirmed{background:#e8f5e9;color:#2e7d32;}
.status-processing{background:#fff3e0;color:#e65100;}
.status-shipped{background:#f3e5f5;color:#6a1b9a;}
.status-out_for_delivery{background:#fce4ec;color:#880e4f;}
.status-delivered{background:#e8f5e9;color:#1b5e20;}

/* TIMELINE */
.timeline{position:relative;padding:10px 0;}
.timeline::before{content:'';position:absolute;left:24px;top:0;bottom:0;width:3px;background:#e0e0e0;}
.timeline-item{display:flex;gap:20px;margin-bottom:25px;position:relative;}
.timeline-dot{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:#e0e0e0;flex-shrink:0;z-index:1;transition:all 0.5s;}
.timeline-dot.done{background:linear-gradient(135deg,var(--green),#2D6A4F);box-shadow:0 4px 15px rgba(27,67,50,0.3);}
.timeline-dot.current{background:linear-gradient(135deg,var(--gold),#e8c060);box-shadow:0 4px 15px rgba(201,168,76,0.4);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 4px 15px rgba(201,168,76,0.4);}50%{box-shadow:0 4px 30px rgba(201,168,76,0.7);}}
.timeline-content{padding-top:10px;}
.timeline-title{font-weight:700;color:var(--green);font-size:15px;}
.timeline-time{font-size:12px;color:#888;margin-top:3px;}
.timeline-desc{font-size:13px;color:#666;margin-top:4px;}

/* ERROR */
.error-card{background:white;border-radius:16px;padding:40px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.07);}
.error-icon{font-size:60px;margin-bottom:15px;}
.error-title{color:#e74c3c;font-size:20px;font-weight:700;margin-bottom:10px;}
.error-desc{color:#888;font-size:14px;}

footer{background:var(--green);color:rgba(255,255,255,0.7);text-align:center;padding:30px;font-size:13px;}
footer .footer-brand{font-family:'Playfair Display',serif;color:var(--gold);font-size:20px;margin-bottom:8px;}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">யாளை கவளம் <span>Rajabaron Signature Health Food</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="cart.html">Cart</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>📍 Track Your Order</h1>
  <p>Enter your Order ID or phone number to track your delivery</p>
</div>

<div class="search-section">
  <div class="search-card">
    <h3>🔍 Find Your Order</h3>
    <div class="search-row">
      <input class="search-input" type="text" id="trackInput" placeholder="Order ID (e.g. YK123456) or Phone Number">
      <button class="search-btn" onclick="trackOrder()">Track →</button>
    </div>
  </div>
</div>

<div class="result-section" id="resultSection">
  <!-- Filled by JS -->
</div>

<footer>
  <div class="footer-brand">யாளை கவளம்</div>
  <p>Need help? Call +91 89252 53862 | © 2024 Yuazhini Foods</p>
</footer>

<script>
const STATUS_STEPS = [
  { key:'placed', label:'Order Placed', icon:'✅', desc:'Your order has been received successfully' },
  { key:'confirmed', label:'Confirmed', icon:'👍', desc:'Order confirmed and payment verified' },
  { key:'processing', label:'Processing', icon:'⚙️', desc:'Your order is being prepared and packed' },
  { key:'shipped', label:'Shipped', icon:'📦', desc:'Order has been dispatched for delivery' },
  { key:'out_for_delivery', label:'Out for Delivery', icon:'🛵', desc:'Your order is on the way to you!' },
  { key:'delivered', label:'Delivered', icon:'🎉', desc:'Order delivered successfully!' }
];

// Auto-search if order ID in URL
const params = new URLSearchParams(window.location.search);
const urlId = params.get('id');
if (urlId) {
  document.getElementById('trackInput').value = urlId;
  trackOrder();
}

async function trackOrder() {
  const query = document.getElementById('trackInput').value.trim();
  if (!query) { alert('Please enter Order ID or phone number'); return; }

  const resultSection = document.getElementById('resultSection');
  resultSection.innerHTML = '<div style="text-align:center;padding:40px;"><div style="font-size:40px;animation:spin 1s linear infinite;display:inline-block;">⏳</div><p style="margin-top:15px;color:#888;">Searching...</p></div>';
  resultSection.classList.add('show');

  try {
    const res = await fetch(`/api/orders/track/${encodeURIComponent(query)}`);
    const data = await res.json();

    if (!data.success || !data.order) {
      resultSection.innerHTML = `
        <div class="error-card">
          <div class="error-icon">🔍</div>
          <div class="error-title">Order Not Found</div>
          <div class="error-desc">No order found for "${query}".<br>Please check your Order ID or phone number.</div>
        </div>`;
      return;
    }

    renderResult(data.order);
  } catch(err) {
    resultSection.innerHTML = `
      <div class="error-card">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Connection Error</div>
        <div class="error-desc">Could not connect to server. Please try again.</div>
      </div>`;
  }
}

function renderResult(order) {
  const currentIdx = STATUS_STEPS.findIndex(s => s.key === order.status);
  const resultSection = document.getElementById('resultSection');

  const timelineHTML = STATUS_STEPS.map((step, idx) => {
    const isDone = idx < currentIdx;
    const isCurrent = idx === currentIdx;
    const dotClass = isDone ? 'done' : isCurrent ? 'current' : '';
    const historyItem = order.statusHistory?.find(h => h.status === step.key);
    const timeStr = historyItem ? new Date(historyItem.timestamp).toLocaleString('en-IN') : '';
    return `
      <div class="timeline-item">
        <div class="timeline-dot ${dotClass}">${step.icon}</div>
        <div class="timeline-content">
          <div class="timeline-title" style="color:${isDone||isCurrent?'var(--green)':'#aaa'}">${step.label}</div>
          ${timeStr ? `<div class="timeline-time">🕐 ${timeStr}</div>` : ''}
          <div class="timeline-desc" style="color:${isDone||isCurrent?'#666':'#ccc'}">${step.desc}</div>
        </div>
      </div>`;
  }).join('');

  resultSection.innerHTML = `
    <div class="order-info-card">
      <div class="order-info-title">📦 Order #${order.orderId}</div>
      <div class="info-row"><span class="info-label">Status</span>
        <span class="status-badge status-${order.status}">${order.status.replace(/_/g,' ').toUpperCase()}</span>
      </div>
      <div class="info-row"><span class="info-label">Items</span>
        <span class="info-value">${order.items?.map(i=>i.name+'×'+i.quantity).join(', ') || '—'}</span>
      </div>
      <div class="info-row"><span class="info-label">Total</span>
        <span class="info-value">₹${order.pricing?.total || '—'}</span>
      </div>
      <div class="info-row"><span class="info-label">Expected Delivery</span>
        <span class="info-value">${order.expectedDelivery ? new Date(order.expectedDelivery).toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : 'Within 5 days'}</span>
      </div>
    </div>
    <div class="order-info-card">
      <div class="order-info-title">🗺️ Delivery Timeline</div>
      <div class="timeline">${timelineHTML}</div>
    </div>`;
}
</script>
</body>
</html>
